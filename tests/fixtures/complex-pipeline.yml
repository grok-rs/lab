stages:
  - build
  - test
  - deploy

variables:
  PROJECT_NAME: "myapp"
  BUILD_DIR: "/tmp/build"

default:
  image: alpine:latest
  before_script:
    - echo "Starting ${CI_JOB_NAME} in ${CI_JOB_STAGE}"

.test_template:
  stage: test
  after_script:
    - echo "Cleaning up test artifacts"

build_app:
  stage: build
  script:
    - echo "Building $PROJECT_NAME"
    - echo "Output to $BUILD_DIR"

build_docs:
  stage: build
  script:
    - echo "Building documentation for $PROJECT_NAME"

unit_tests:
  extends: .test_template
  script:
    - echo "Running unit tests"
  needs:
    - build_app

integration_tests:
  extends: .test_template
  script:
    - echo "Running integration tests"
  needs:
    - build_app

lint:
  stage: test
  script:
    - echo "Linting code"

deploy_staging:
  stage: deploy
  script:
    - echo "Deploying $PROJECT_NAME to staging"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: always
    - when: never
