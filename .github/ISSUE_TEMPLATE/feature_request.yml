name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for lab? We'd love to hear it.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What's the use case?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should it work? Include CLI examples if possible.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Pipeline execution
        - YAML parsing / keyword support
        - Secrets management
        - Pipeline analysis rules
        - MCP / AI integration
        - CLI / UX
        - Docker / containers
        - Documentation
        - Other

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: GitLab CI YAML snippet, screenshots, links to GitLab docs, etc.
